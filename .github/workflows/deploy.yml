name: Deploy to VPS

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Copy files to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        # password: ${{ secrets.VPS_PASSWORD }} # Descomente se usar senha em vez de chave
        port: 22
        debug: true
        source: "."
        target: "/home/${{ secrets.VPS_USERNAME }}/finaBotTelegram"
        
    - name: Execute remote ssh commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        # password: ${{ secrets.VPS_PASSWORD }} # Descomente se usar senha em vez de chave
        port: 22
        debug: true
        script: |
          cd /home/${{ secrets.VPS_USERNAME }}/finaBotTelegram
          
          # Copia .env se não existir (ou atualiza)
          # Assumindo que você tem um .env.example ou gerencia via secrets
          # echo "${{ secrets.ENV_FILE }}" > .env
          
          # Build e Deploy com Docker Compose
          docker-compose down --remove-orphans
          docker-compose build
          docker-compose up -d
          
          # Verifica status
          docker-compose ps
