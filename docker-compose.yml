services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finbot_python
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/finbot.db
      WHATSAPP_ADAPTER_URL: http://whatsapp-adapter:3000/send-message
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-}
      WHATSAPP_ADAPTER_API_KEY: ${WHATSAPP_ADAPTER_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./finbot.db:/app/finbot.db
    depends_on:
      - whatsapp-adapter
    ports:
      - "8000:8000"
    command: ["python", "main_api.py"]

  whatsapp-adapter:
    build:
      context: ./finbot-baileys
      dockerfile: Dockerfile
    container_name: finbot_whatsapp
    restart: unless-stopped
    volumes:
      - ./auth_info_baileys:/app/auth_info_baileys
    ports:
      - "3000:3000"
    environment:
      WEBHOOK_URL: http://bot:8000/webhook
      BAILEYS_AUTH_FOLDER: /app/auth_info_baileys
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-}
      WHATSAPP_ADAPTER_API_KEY: ${WHATSAPP_ADAPTER_API_KEY:-}
